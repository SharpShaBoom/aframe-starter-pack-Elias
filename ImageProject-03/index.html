<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-assets>
        <img id="sky" src="assets/black rooms.jpeg" alt="">
        <a-asset-item id="phone" src="assets/phonestation.obj"></a-asset-item>
        <a-asset-item id="cube" src="assets/RubiksCube.obj"></a-asset-item>
        <a-asset-item id="cube.mtl" src="assets/RubiksCube.mtl"></a-asset-item>
        <a-asset-item id="phone.mtl" src="assets/RubiksCube.mtl"></a-asset-item>
      </a-assets>
    <a-scene>
      <a-entity obj-model="obj: #phone; mtl: #phone.mtl" 
		position = "0 0 -4"
		rotation="0 0 0"
		scale="0.4 0.5 0.5">
	</a-entity>

  <a-entity obj-model="obj: #cube; mtl: #cube.mtl" 
		position = "1 -1 -3"
		rotation="0 0 0"
		scale="0.4 0.5 0.5">
	</a-entity>
      
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
